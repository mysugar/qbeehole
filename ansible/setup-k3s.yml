---
- name: Setup k3s on Linux Server
  hosts: k3s_nodes
  become: true
  vars:
    # 建议禁用 traefik 以便后续通过 GitOps 严格管理 Ingress
    k3s_install_args: "--disable traefik"
    local_kubeconfig: "~/.kube/config"

  tasks:
    - name: Switch to domestic APT mirror
      replace:
        path: /etc/apt/sources.list
        regexp: '(archive|security)\.ubuntu\.com'
        replace: "{{ apt_mirror }}"
      when: ansible_os_family == "Debian"
      tags: ["apt-mirror", "prep"]

    - name: Disable swap (k3s requirement)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      when: ansible_swaptotal_mb > 0
      ignore_errors: true
      tags: ["prep", "system"]

    - name: Install NFS utilities
      apt:
        name: nfs-common
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
      tags: ["nfs", "deps"]

    - name: Ensure /etc/rancher/k3s directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'
      tags: ["config"]

    - name: Configure k3s proxy environment file
      template:
        src: k3s.service.env.j2
        dest: /etc/systemd/system/k3s.service.env
        mode: '0600'
      register: proxy_config
      tags: ["proxy", "config"]

    - name: Configure k3s container registries
      template:
        src: registries.yaml.j2
        dest: /etc/rancher/k3s/registries.yaml
        mode: '0644'
      register: registry_config
      tags: ["registry", "config"]

    - name: Install k3s
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} INSTALL_K3S_EXEC='server {{ k3s_install_args }}' sh -"
      environment: "{{ proxy_env }}"
      args:
        creates: /usr/local/bin/k3s
      tags: ["k3s", "install"]

    - name: Restart k3s if config changed
      systemd:
        name: k3s
        state: restarted
        daemon_reload: true
      when: proxy_config.changed or registry_config.changed
      tags: ["config", "service"]

    - name: Wait for k3s to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
      tags: ["install"]

    - name: Fetch kubeconfig to local Mac
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig }}"
        flat: true
      tags: ["kubeconfig"]

    - name: Update server address in local kubeconfig
      delegate_to: localhost
      become: false
      replace:
        path: "{{ local_kubeconfig }}"
        regexp: '127.0.0.1'
        replace: "{{ ansible_host }}"
      tags: ["kubeconfig"]
