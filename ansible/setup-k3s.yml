---
- name: Setup k3s on Linux Server
  hosts: k3s_nodes
  become: true
  vars:
    # 建议禁用 traefik 以便后续通过 GitOps 严格管理 Ingress
    k3s_install_args: "--disable traefik"
    local_kubeconfig: "~/.kube/config"

  tasks:
    - name: Disable swap (k3s requirement)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      when: ansible_swaptotal_mb > 0
      ignore_errors: true

    - name: Install k3s
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC='server {{ k3s_install_args }}' sh -"
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present

    - name: Fetch kubeconfig to local Mac
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig }}"
        flat: true

    - name: Update server address in local kubeconfig
      delegate_to: localhost
      become: false
      replace:
        path: "{{ local_kubeconfig }}"
        regexp: '127.0.0.1'
        replace: "{{ ansible_host }}"
