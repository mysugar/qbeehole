---
- name: Get Join Token and Version from Master
  hosts: k3s_nodes
  become: true
  tasks:
    - name: Read node-token from master
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_b64

    - name: Get k3s version from master
      shell: k3s --version | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+\+k3s[0-9]+'
      register: master_version_cmd

    - name: Store facts
      set_fact:
        k3s_token: "{{ node_token_b64.content | b64decode | trim }}"
        k3s_version: "{{ master_version_cmd.stdout | trim }}"

- name: Join Worker Node to Cluster
  hosts: k3s_workers
  become: true
  vars:
    # 从 k3s_nodes 组的第一个主机获取 facts
    master_ip: "{{ hostvars[groups['k3s_nodes'][0]]['ansible_host'] }}"
    master_token: "{{ hostvars[groups['k3s_nodes'][0]]['k3s_token'] }}"
    target_version: "{{ hostvars[groups['k3s_nodes'][0]]['k3s_version'] }}"

  tasks:
    - name: Disable swap (k3s requirement)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      when: ansible_swaptotal_mb > 0
      ignore_errors: true

    - name: Install k3s agent and join cluster (matching master version)
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ target_version }} K3S_URL=https://{{ master_ip }}:6443 K3S_TOKEN={{ master_token }} sh -s - agent --node-ip={{ ansible_host }} --node-external-ip={{ ansible_host }}"

