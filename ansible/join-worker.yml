---
- name: Get Join Token and Version from Master
  hosts: k3s_nodes
  become: true
  tasks:
    - name: Read node-token from master
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_b64

    - name: Store token as fact
      set_fact:
        k3s_token: "{{ node_token_b64.content | b64decode | trim }}"

- name: Join Worker Node to Cluster
  hosts: k3s_workers
  become: true
  vars:
    master_ip: "{{ hostvars[groups['k3s_nodes'][0]]['ansible_host'] }}"
    k3s_token: "{{ hostvars[groups['k3s_nodes'][0]]['k3s_token'] }}"
    k3s_url: "https://{{ master_ip }}:6443"
    k3s_agent_args: "--node-ip={{ ansible_host }} --node-external-ip={{ ansible_host }}"

  tasks:
    - name: Disable swap (k3s requirement)
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      when: ansible_swaptotal_mb > 0
      ignore_errors: true

    - name: Install NFS utilities
      apt:
        name: nfs-common
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure /etc/rancher/k3s directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Configure k3s-agent proxy and credentials environment file
      template:
        src: k3s.service.env.j2
        dest: /etc/systemd/system/k3s-agent.service.env
        mode: '0600'
      register: proxy_config

    - name: Configure k3s container registries
      template:
        src: registries.yaml.j2
        dest: /etc/rancher/k3s/registries.yaml
        mode: '0644'
      register: registry_config

    - name: Install k3s agent and join cluster
      shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} K3S_URL={{ k3s_url }} K3S_TOKEN={{ k3s_token }} sh -s - agent {{ k3s_agent_args }}"
      environment: "{{ proxy_env }}"
      args:
        creates: /usr/local/bin/k3s

    - name: Restart k3s-agent if config changed
      systemd:
        name: k3s-agent
        state: restarted
        daemon_reload: true
      when: proxy_config.changed or registry_config.changed

