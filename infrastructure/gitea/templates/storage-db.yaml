apiVersion: v1
kind: PersistentVolume
metadata:
  name: gitea-db-nas-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.50.180
    path: /Public/mysql
  mountOptions:
    - nfsvers=4.1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-db-nas-pvc
  namespace: infrastructure
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  volumeName: gitea-db-nas-pv
  storageClassName: ""
