apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: beehole-backend-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    path: apps/beehole-backend
    targetRevision: {{ .Values.targetRevision }}
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: beehole-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: beehole-backend-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    path: apps/beehole-backend
    targetRevision: {{ .Values.targetRevision }}
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: beehole-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
